<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>audiovisualism</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <button id="autoToggle" title="Toggle self-animation (ignores audio)">AUTO · OFF</button>
    <label id="sensCtl" title="Audio sensitivity">
      <span>SENS</span>
      <input type="range" id="sensRange" min="0.2" max="4" step="0.1" value="1" />
    </label>
  </div>

  <script src="src/config.js"></script>
  <script src="src/kolam.js"></script>
  <script src="src/input.js"></script>
  <script src="src/console.js"></script>
  <script type="module" src="src/three-app.js"></script>
</body>
</html>
